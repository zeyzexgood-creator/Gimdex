name: Flutter Release Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Fix Gradle structure
        run: |
          # Backup existing files jika ada
          if [ -d "android" ]; then
            mkdir -p android_backup
            cp -r android/* android_backup/ 2>/dev/null || true
          fi
          
          # Regenerate Android folder dengan struktur yang benar
          rm -rf android
          flutter create --platforms=android --org=com.nest .
          
          # Restore custom configurations jika diperlukan
          # (assets, keystore, dll)
          
          echo "Android folder regenerated successfully"

      - name: Update app name
        run: |
          # Update app name di AndroidManifest.xml
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            sed -i 's/android:label="[^"]*"/android:label="Nest"/' android/app/src/main/AndroidManifest.xml
          fi
          
          # Update strings.xml
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Nest</string>
          </resources>
          EOF

      - name: Clean project
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Build Android Release APK
        run: flutter build apk --release

      - name: Upload Flutter APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nest-music-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error